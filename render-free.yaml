services:
  - type: web
    name: wp-resource-search-demo
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /api/config
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
